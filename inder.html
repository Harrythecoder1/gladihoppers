<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gladihoppers</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #unity-container {
      width: 960px;
      height: 540px;
    }
    canvas {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>

  <script>
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Gladihoppers.loader.js";

    var config = {
      dataUrl: buildUrl + "/Gladihoppers.data.unityweb",
      frameworkUrl: buildUrl + "/Gladihoppers.wasm.framework.unityweb",
      codeUrl: buildUrl + "/Gladihoppers.wasm.code.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Gladihoppers",
      productVersion: "1.0"
    };

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(document.querySelector("#unity-canvas"), config);
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
